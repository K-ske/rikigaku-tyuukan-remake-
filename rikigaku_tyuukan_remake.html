<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>力学演習A — 中間試験問題集</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #000;
  color: #e8dfc8;
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ========== MENU PAGE ========== */
#menu-page {
  position: relative;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px 60px;
  overflow: hidden;
}

/* Animated background layers */
.bg-layer {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}
.bg-stars {
  background:
    radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 40% 8%, rgba(255,255,255,0.7) 0%, transparent 100%),
    radial-gradient(1px 1px at 55% 30%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 70% 18%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 80% 50%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 15% 70%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 35% 85%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 60% 75%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 75% 90%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 88% 65%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 5% 55%, rgba(255,255,255,0.35) 0%, transparent 100%),
    radial-gradient(1px 1px at 45% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 93% 35%, rgba(255,255,255,0.5) 0%, transparent 100%);
  background-color: #000010;
}
.bg-glow-blue {
  background: radial-gradient(ellipse 80% 60% at 50% 100%, rgba(20,60,160,0.35) 0%, transparent 70%);
  animation: glowPulse 6s ease-in-out infinite alternate;
}
.bg-glow-gold {
  background: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(180,130,40,0.12) 0%, transparent 70%);
}
@keyframes glowPulse {
  from { opacity: 0.6; }
  to { opacity: 1; }
}

/* Floating orb */
.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(60px);
  pointer-events: none;
  animation: orbFloat 10s ease-in-out infinite alternate;
  z-index: 0;
}
.orb-1 {
  width: 300px; height: 300px;
  background: rgba(60,100,220,0.18);
  top: -80px; right: -60px;
  animation-delay: 0s;
}
.orb-2 {
  width: 200px; height: 200px;
  background: rgba(180,130,40,0.12);
  bottom: 60px; left: -40px;
  animation-delay: -4s;
}
@keyframes orbFloat {
  from { transform: translate(0, 0) scale(1); }
  to   { transform: translate(20px, -30px) scale(1.1); }
}

/* Chain decorative line */
.chain-line {
  position: relative;
  width: 100%;
  max-width: 560px;
  height: 1px;
  margin: 0 auto;
}
.chain-line::before, .chain-line::after {
  content: '';
  position: absolute;
  top: 0; left: 10%; right: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(200,170,80,0.6) 30%, rgba(200,170,80,0.8) 50%, rgba(200,170,80,0.6) 70%, transparent);
}
.chain-line::after {
  top: 4px;
  opacity: 0.3;
}

/* ========== HEADER ========== */
.menu-header {
  position: relative;
  z-index: 10;
  text-align: center;
  margin-bottom: 48px;
}
.menu-eyebrow {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.35em;
  color: rgba(200,170,80,0.75);
  text-transform: uppercase;
  margin-bottom: 16px;
}
.menu-title-main {
  font-family: 'Cinzel', serif;
  font-size: clamp(28px, 5vw, 48px);
  font-weight: 700;
  letter-spacing: 0.08em;
  line-height: 1.1;
  margin-bottom: 6px;
  background: linear-gradient(180deg, #fff8e8 0%, #c8aa50 50%, #8a6e20 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 20px rgba(200,170,80,0.4));
}
.menu-title-sub {
  font-family: 'Cinzel', serif;
  font-size: clamp(13px, 2vw, 17px);
  font-weight: 400;
  letter-spacing: 0.25em;
  color: rgba(220,200,150,0.7);
  margin-bottom: 24px;
}
.chain-line { margin-bottom: 0; }

/* ========== MENU ITEMS (KH style vertical list) ========== */
.menu-list {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 560px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.menu-item {
  position: relative;
  display: flex;
  align-items: center;
  gap: 0;
  cursor: pointer;
  padding: 0;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  outline: none;
  group: true;
}

.mi-bg {
  position: absolute;
  inset: 0;
  border-radius: 4px;
  background: linear-gradient(90deg,
    rgba(30,60,140,0) 0%,
    rgba(30,60,140,0.04) 20%,
    rgba(30,60,140,0) 100%);
  opacity: 0;
  transition: opacity 0.25s;
}
.menu-item:hover .mi-bg,
.menu-item.selected .mi-bg {
  opacity: 1;
  background: linear-gradient(90deg,
    rgba(30,60,140,0) 0%,
    rgba(50,100,230,0.18) 30%,
    rgba(80,150,255,0.25) 50%,
    rgba(50,100,230,0.18) 70%,
    rgba(30,60,140,0) 100%);
}

/* The cursor triangle (KH style) */
.mi-cursor {
  width: 20px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.2s, transform 0.2s;
  margin-left: 8px;
}
.mi-cursor svg {
  width: 12px; height: 12px;
  fill: #c8aa50;
  filter: drop-shadow(0 0 4px rgba(200,170,80,0.8));
}
.menu-item:hover .mi-cursor,
.menu-item.selected .mi-cursor {
  opacity: 1;
  transform: translateX(2px);
}

/* Number badge */
.mi-num {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  font-weight: 600;
  color: rgba(200,170,80,0.55);
  letter-spacing: 0.1em;
  width: 36px;
  flex-shrink: 0;
  text-align: right;
  padding-right: 4px;
  transition: color 0.2s;
}
.menu-item:hover .mi-num,
.menu-item.selected .mi-num {
  color: rgba(200,170,80,0.9);
}

/* Separator dot */
.mi-sep {
  width: 24px;
  flex-shrink: 0;
  text-align: center;
  color: rgba(200,170,80,0.3);
  font-size: 10px;
  transition: color 0.2s;
}
.menu-item:hover .mi-sep,
.menu-item.selected .mi-sep {
  color: rgba(200,170,80,0.7);
}

/* Main label */
.mi-body {
  flex: 1;
  padding: 14px 12px 14px 0;
}
.mi-round {
  font-family: 'Cinzel', serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.3em;
  color: rgba(200,170,80,0.55);
  text-transform: uppercase;
  margin-bottom: 2px;
  transition: color 0.2s;
}
.mi-title {
  font-size: 18px;
  font-weight: 500;
  letter-spacing: 0.06em;
  color: rgba(232,220,195,0.85);
  transition: color 0.2s, text-shadow 0.2s;
  line-height: 1.3;
}
.menu-item:hover .mi-round,
.menu-item.selected .mi-round { color: rgba(200,170,80,0.9); }
.menu-item:hover .mi-title,
.menu-item.selected .mi-title {
  color: #fff;
  text-shadow: 0 0 20px rgba(100,160,255,0.5), 0 0 40px rgba(100,160,255,0.2);
}

/* Right arrow */
.mi-arrow {
  font-size: 14px;
  color: rgba(200,170,80,0);
  margin-right: 16px;
  transition: color 0.2s, transform 0.2s;
  flex-shrink: 0;
}
.menu-item:hover .mi-arrow,
.menu-item.selected .mi-arrow {
  color: rgba(200,170,80,0.7);
  transform: translateX(3px);
}

/* Divider between items */
.mi-divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(200,170,80,0.12) 30%, rgba(200,170,80,0.12) 70%, transparent);
  margin: 0 12px;
}

/* ========== VIEWER PAGE ========== */
#viewer-page {
  display: none;
  position: fixed;
  inset: 0;
  flex-direction: column;
  background: #000;
  z-index: 200;
}
#viewer-page.active { display: flex; }

.viewer-bar {
  background: linear-gradient(90deg, #0a0d1a 0%, #0d1020 50%, #0a0d1a 100%);
  border-bottom: 1px solid rgba(200,170,80,0.2);
  padding: 0 20px;
  height: 50px;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
}
.back-btn {
  background: none;
  border: 1px solid rgba(200,170,80,0.35);
  border-radius: 4px;
  color: rgba(200,170,80,0.85);
  cursor: pointer;
  font-family: 'Cinzel', serif;
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 0.15em;
  padding: 6px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.2s;
  white-space: nowrap;
}
.back-btn:hover {
  background: rgba(200,170,80,0.1);
  border-color: rgba(200,170,80,0.7);
  color: #fff8e8;
  box-shadow: 0 0 12px rgba(200,170,80,0.15);
}
.viewer-title {
  font-size: 13px;
  letter-spacing: 0.08em;
  color: rgba(200,170,80,0.55);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-family: 'Cinzel', serif;
}
#content-frame {
  flex: 1;
  border: none;
  width: 100%;
  height: 100%;
}

/* Enter animation */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
.menu-header { animation: fadeInUp 0.7s ease both; }
.menu-item { animation: fadeInUp 0.5s ease both; }
.menu-item:nth-child(1)  { animation-delay: 0.15s; }
.menu-item:nth-child(2)  { animation-delay: 0.22s; }
.menu-item:nth-child(3)  { animation-delay: 0.29s; }
.menu-item:nth-child(4)  { animation-delay: 0.36s; }
.menu-item:nth-child(5)  { animation-delay: 0.43s; }
.menu-item:nth-child(6)  { animation-delay: 0.50s; }
.mi-divider { animation: fadeInUp 0.4s ease both; }
.mi-divider:nth-of-type(2)  { animation-delay: 0.18s; }
.mi-divider:nth-of-type(3)  { animation-delay: 0.25s; }
.mi-divider:nth-of-type(4)  { animation-delay: 0.32s; }
.mi-divider:nth-of-type(5)  { animation-delay: 0.39s; }
.mi-divider:nth-of-type(6)  { animation-delay: 0.46s; }

/* Bottom tagline */
.menu-footer {
  position: relative;
  z-index: 10;
  margin-top: 40px;
  text-align: center;
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 0.3em;
  color: rgba(200,170,80,0.25);
  text-transform: uppercase;
  animation: fadeInUp 0.6s ease 0.7s both;
}
</style>
</head>

function openLesson(idx) {
  document.getElementById('viewer-title').textContent = titles[idx];
  const frame = document.getElementById('content-frame');
  frame.src = pages[idx];
  document.getElementById('menu-page').style.display = 'none';
  const vp = document.getElementById('viewer-page');
  vp.classList.add('active');
}

function goBack() {
  const vp = document.getElementById('viewer-page');
  vp.classList.remove('active');
  document.getElementById('menu-page').style.display = 'flex';
  setTimeout(() => {
    document.getElementById('content-frame').src = 'about:blank';
  }, 300);
}
</script>
